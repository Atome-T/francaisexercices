<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyse grammaticale – quiz 4 niveaux complet</title>
<style>
body{font-family:Arial;background:#f4f4f4;margin:0;}
header{background:#4CAF50;color:white;text-align:center;padding:20px;}
.container{max-width:950px;margin:auto;background:white;padding:25px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);margin-top:20px;}
.progress-container{background:#ddd;border-radius:10px;margin-bottom:20px;}
.progress-bar{height:20px;width:0%;background:#4CAF50;border-radius:10px;transition:0.4s;}
.question{font-size:20px;margin-bottom:15px;}
.option{display:block;padding:12px;margin:8px 0;background:#4CAF50;color:white;border-radius:6px;cursor:pointer;}
.option:hover{background:#3e8e41;}
.feedback{margin-top:15px;font-weight:bold;font-size:18px;}
.score{margin-top:10px;font-size:18px;}
button{margin-top:20px;padding:12px 18px;font-size:16px;cursor:pointer;}
.hidden{display:none;}
h2.level-title{margin-top:0;color:#4CAF50;}
.correct{color:green;}
.incorrect{color:red;}
</style>
</head>
<body>
<header>
<h1>Analyse grammaticale – quiz 4 niveaux</h1>
<p>Classe de 6P</p>
</header>
<div class="container">
<div class="progress-container">
  <div id="progressBar" class="progress-bar"></div>
</div>

<div id="quiz">
  <h2 id="levelTitle" class="level-title"></h2>
  <div id="question" class="question"></div>
  <div id="options"></div>
  <div class="feedback" id="feedback"></div>
  <div class="score">
    Score : <span id="score">0</span> / 40
  </div>
</div>

<div id="endScreen" class="hidden">
<h2>🎉 Exercice terminé</h2>
<p id="finalScore"></p>
<div id="detailedCorrection"></div>
<button onclick="restartQuiz()">Recommencer</button>
</div>
</div>

<script>
// Utilitaire
function shuffle(array){return array.sort(()=>Math.random()-0.5);}

// Définition des niveaux et questions
const levels=[
  {
    title:"Niveau 1 : Repérer le verbe conjugué",
    questions:[
      {question:"Le président du club a décidé d'organiser une réunion.",
       options:["a décidé","a","décidé","organiser"],
       answer:"a décidé",
       explanation:"Le verbe conjugué au passé composé est 'a décidé'."},
      {question:"Les étudiantes veulent préparer leurs projets.",
       options:["veulent","préparer","leurs projets","Les étudiantes"],
       answer:"veulent",
       explanation:"Le verbe conjugué est 'veulent'."},
      {question:"Mon frère et sa sœur vont lire un livre.",
       options:["vont","lire","Mon frère et sa sœur","un livre"],
       answer:"vont",
       explanation:"Le verbe conjugué est 'vont'."},
      {question:"La directrice a expliqué les consignes.",
       options:["a expliqué","a","expliqué","les consignes"],
       answer:"a expliqué",
       explanation:"Passé composé, le verbe conjugué est 'a expliqué'."},
      {question:"Pierre a décidé d'écrire une lettre.",
       options:["a décidé","a","décidé","d'écrire"],
       answer:"a décidé",
       explanation:"Passé composé, verbe conjugué 'a décidé'."},
      {question:"Les enfants vont chanter une chanson.",
       options:["vont","chanter","Les enfants","une chanson"],
       answer:"vont",
       explanation:"Verbe conjugué futur proche : 'vont'."},
      {question:"Mon oncle aime regarder un film.",
       options:["aime","regarder","Mon oncle","un film"],
       answer:"aime",
       explanation:"Verbe conjugué présent : 'aime'."},
      {question:"Julie préfère manger un gâteau.",
       options:["préfère","manger","Julie","un gâteau"],
       answer:"préfère",
       explanation:"Verbe conjugué présent : 'préfère'."},
      {question:"Le chien a attrapé une balle.",
       options:["a attrapé","a","attrapé","Le chien"],
       answer:"a attrapé",
       explanation:"Passé composé : 'a attrapé'."},
      {question:"Les garçons vont jouer au football.",
       options:["vont","jouer","Les garçons","au football"],
       answer:"vont",
       explanation:"Verbe conjugué futur proche : 'vont'."}
    ]
  },

  { title:"Niveau 2 : Trouver le sujet", questions:[
    {question:"Le président du club et son équipe ont organisé une réunion.", options:["Le président du club et son équipe","Le président","son équipe"], answer:"Le président du club et son équipe", explanation:"Sujet complet."},
    {question:"Les étudiantes de la classe de français veulent préparer leurs projets.", options:["Les étudiantes de la classe de français","Les étudiantes","de la classe de français"], answer:"Les étudiantes de la classe de français", explanation:"Sujet complet."},
    {question:"Mon frère et sa sœur aînée vont lire un livre.", options:["Mon frère et sa sœur aînée","Mon frère","sa sœur aînée"], answer:"Mon frère et sa sœur aînée", explanation:"Sujet complet."},
    {question:"La directrice et son adjoint souhaitent expliquer les consignes.", options:["La directrice et son adjoint","La directrice","son adjoint"], answer:"La directrice et son adjoint", explanation:"Sujet complet."},
    {question:"Pierre et ses amis ont décidé d'écrire une lettre.", options:["Pierre et ses amis","Pierre","ses amis"], answer:"Pierre et ses amis", explanation:"Sujet complet."},
    {question:"Les enfants de l'école vont chanter une chanson.", options:["Les enfants de l'école","Les enfants","de l'école"], answer:"Les enfants de l'école", explanation:"Sujet complet."},
    {question:"Mon oncle et ma tante aiment regarder un film.", options:["Mon oncle et ma tante","Mon oncle","ma tante"], answer:"Mon oncle et ma tante", explanation:"Sujet complet."},
    {question:"Julie et sa cousine préfèrent manger un gâteau.", options:["Julie et sa cousine","Julie","sa cousine"], answer:"Julie et sa cousine", explanation:"Sujet complet."},
    {question:"Le chien et son chiot aiment attraper une balle.", options:["Le chien et son chiot","Le chien","son chiot"], answer:"Le chien et son chiot", explanation:"Sujet complet."},
    {question:"Les garçons et leurs amis vont jouer au football.", options:["Les garçons et leurs amis","Les garçons","leurs amis"], answer:"Les garçons et leurs amis", explanation:"Sujet complet."}
  ]},

  { title:"Niveau 3 : Trouver le prédicat", questions:[
    {question:"Le président du club et son équipe ont organisé une réunion.", options:["ont organisé une réunion","Le président","son équipe"], answer:"ont organisé une réunion", explanation:"Le prédicat est tout ce que fait le sujet."},
    {question:"Les étudiantes de la classe de français veulent préparer leurs projets.", options:["veulent préparer leurs projets","Les étudiantes","de la classe de français"], answer:"veulent préparer leurs projets", explanation:"Prédicat = action du sujet."},
    {question:"Mon frère et sa sœur aînée vont lire un livre.", options:["vont lire un livre","Mon frère et sa sœur aînée","un livre"], answer:"vont lire un livre", explanation:"Prédicat = tout ce que fait le sujet."},
    {question:"La directrice et son adjoint souhaitent expliquer les consignes.", options:["souhaitent expliquer les consignes","La directrice et son adjoint","les consignes"], answer:"souhaitent expliquer les consignes", explanation:"Prédicat."},
    {question:"Pierre et ses amis ont décidé d'écrire une lettre.", options:["ont décidé d'écrire une lettre","Pierre et ses amis","une lettre"], answer:"ont décidé d'écrire une lettre", explanation:"Prédicat."},
    {question:"Les enfants de l'école vont chanter une chanson.", options:["vont chanter une chanson","Les enfants de l'école","une chanson"], answer:"vont chanter une chanson", explanation:"Prédicat."},
    {question:"Mon oncle et ma tante aiment regarder un film.", options:["aiment regarder un film","Mon oncle et ma tante","un film"], answer:"aiment regarder un film", explanation:"Prédicat."},
    {question:"Julie et sa cousine préfèrent manger un gâteau.", options:["préfèrent manger un gâteau","Julie et sa cousine","un gâteau"], answer:"préfèrent manger un gâteau", explanation:"Prédicat."},
    {question:"Le chien et son chiot aiment attraper une balle.", options:["aiment attraper une balle","Le chien et son chiot","une balle"], answer:"aiment attraper une balle", explanation:"Prédicat."},
    {question:"Les garçons et leurs amis vont jouer au football.", options:["vont jouer au football","Les garçons et leurs amis","au football"], answer:"vont jouer au football", explanation:"Prédicat."}
  ]},

  { title:"Niveau 4 : Complément de verbe (CVD/CVI)", questions:[
    {question:"Pierre a donné un livre à son ami.", options:["un livre ET à son ami","Pierre","a donné"], answer:"un livre ET à son ami", explanation:"CVD + CVI : Pierre a donné un livre à son ami."},
    {question:"Les enfants vont chanter une chanson.", options:["chanter une chanson","Les enfants","vont"], answer:"chanter une chanson", explanation:"CVD seul : ce que font les enfants."},
    {question:"La maîtresse a expliqué la leçon à ses élèves.", options:["la leçon ET à ses élèves","La maîtresse","a expliqué"], answer:"la leçon ET à ses élèves", explanation:"CVD + CVI : la leçon est donnée aux élèves."},
    {question:"Paul a donné un jouet.", options:["un jouet","Paul","a donné"], answer:"un jouet", explanation:"CVD seul : ce que Paul a donné."},
    {question:"Le directeur a présenté le projet aux parents.", options:["le projet ET aux parents","Le directeur","a présenté"], answer:"le projet ET aux parents", explanation:"CVD + CVI : le projet présenté aux parents."},
    {question:"Marie a prêté son dictionnaire.", options:["son dictionnaire","Marie","a prêté"], answer:"son dictionnaire", explanation:"CVD seul : ce que Marie a prêté."},
    {question:"Les pompiers ont sauvé le chat dans l'arbre.", options:["le chat","dans l'arbre","Les pompiers"], answer:"le chat", explanation:"CVD seul : ce que les pompiers ont sauvé."},
    {question:"Thomas a envoyé une carte postale à sa grand-mère.", options:["une carte postale ET à sa grand-mère","Thomas","a envoyé"], answer:"une carte postale ET à sa grand-mère", explanation:"CVD + CVI : carte envoyée à sa grand-mère."},
    {question:"Les élèves ont remis leurs travaux au professeur.", options:["leurs travaux ET au professeur","Les élèves","ont remis"], answer:"leurs travaux ET au professeur", explanation:"CVD + CVI : travaux remis au professeur."},
    {question:"Le cuisinier a préparé un gâteau.", options:["un gâteau","Le cuisinier","a préparé"], answer:"un gâteau", explanation:"CVD seul : ce que le cuisinier a préparé."}
  ]}
];

// Variables de suivi
let currentLevel=0, currentQuestionIndex=0, score=0, userAnswers=[];

// Fonctions
function startQuiz(){currentLevel=0; currentQuestionIndex=0; score=0; userAnswers=[]; showQuestion();}
function showQuestion(){
  const level=levels[currentLevel]; const q=level.questions[currentQuestionIndex];
  document.getElementById("levelTitle").textContent=level.title;
  document.getElementById("question").textContent=q.question;
  const optionsDiv=document.getElementById("options"); optionsDiv.innerHTML="";
  shuffle([...q.options]).forEach(opt=>{
    const div=document.createElement("div"); div.className="option"; div.textContent=opt; div.onclick=()=>checkAnswer(opt);
    optionsDiv.appendChild(div);
  });
  document.getElementById("score").textContent=score;
  updateProgress();
}
function checkAnswer(choice){
  const level=levels[currentLevel]; const q=level.questions[currentQuestionIndex];
  const feedback=document.getElementById("feedback");
  const correct=(choice===q.answer);
  userAnswers.push({level:currentLevel, question:q.question, choice, correct, explanation:q.explanation});
  feedback.innerHTML=correct?"✅ Bonne réponse!":"❌ Mauvaise réponse. La bonne réponse était : "+q.answer;
  if(correct) score++;
  currentQuestionIndex++;
  setTimeout(()=>{
    feedback.innerHTML="";
    if(currentQuestionIndex<level.questions.length){showQuestion();}
    else{currentLevel++; if(currentLevel<levels.length){currentQuestionIndex=0; showQuestion();}else{endQuiz();}}
  },1000);
}
function updateProgress(){
  let total=levels.reduce((sum,lvl)=>sum+lvl.questions.length,0);
  let done=levels.slice(0,currentLevel).reduce((sum,lvl)=>sum+lvl.questions.length,0)+currentQuestionIndex;
  document.getElementById("progressBar").style.width=(done/total*100)+"%";
}
function endQuiz(){
  document.getElementById("quiz").classList.add("hidden");
  document.getElementById("endScreen").classList.remove("hidden");
  document.getElementById("finalScore").textContent="Ton score : "+score+" / 40";
  const correctionDiv=document.getElementById("detailedCorrection");
  correctionDiv.innerHTML="";
  levels.forEach((lvl,i)=>{
    const lvlAns=userAnswers.filter(a=>a.level===i);
    if(lvlAns.length>0){
      let html="<h3>"+lvl.title+"</h3><ul>";
      lvlAns.forEach(a=>{html+="<li>"+a.question+"<br>Ta réponse : <strong class='"+(a.correct?"correct":"incorrect")+"'>"+a.choice+"</strong><br>Correction : "+a.explanation+"</li>";});
      html+="</ul>";
      correctionDiv.innerHTML+=html;
    }
  });
}
function restartQuiz(){document.getElementById("quiz").classList.remove("hidden");document.getElementById("endScreen").classList.add("hidden");startQuiz();}
startQuiz();
</script>
</body>
</html>
